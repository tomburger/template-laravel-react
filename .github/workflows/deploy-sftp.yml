name: Build And Deploy Via SFTP
run-name: Deploy build #${{ github.run_number }} on ${{ github.ref_name }}

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-sftp-master
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: UTC
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate deployment secrets
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SFTP_PASSWORD" || (echo "Missing secret: SFTP_PASSWORD" && exit 1)

      - name: Compute release name
        id: release
        run: |
          set -euo pipefail
          BUILD_TS="$(date -u +'%Y%m%d-%H%M%S')"
          RELEASE_NAME="build-${BUILD_TS}-r${GITHUB_RUN_NUMBER}"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"
          echo "Release: $RELEASE_NAME"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Ensure Laravel writable directories exist
        working-directory: src
        run: |
          set -euo pipefail
          mkdir -p bootstrap/cache
          mkdir -p storage/logs
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views

      - name: Install backend dependencies
        working-directory: src
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Generate Scribe documentation
        working-directory: src
        env:
          APP_ENV: ci
          APP_DEBUG: false
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan scribe:generate --no-interaction --force

      - name: Ensure OpenAPI file exists
        run: |
          set -euo pipefail
          test -f src/storage/app/scribe/openapi.yaml || (echo "Missing generated file: src/storage/app/scribe/openapi.yaml" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install frontend dependencies
        working-directory: src
        run: npm ci

      - name: Build frontend
        working-directory: src
        run: |
          set -euo pipefail
          rm -rf public/build
          npm run build

      - name: Ensure Vite build exists
        run: |
          set -euo pipefail
          if [ -f src/public/build/manifest.json ] || [ -f src/public/build/.vite/manifest.json ]; then
            echo "Vite manifest found."
            exit 0
          fi

          echo "Missing generated file: src/public/build/manifest.json or src/public/build/.vite/manifest.json"
            echo "Directory listing for src/public/build:"
            ls -la src/public/build || true
            echo "Recursive listing for src/public/build:"
            find src/public/build -maxdepth 4 -type f || true
            exit 1

      - name: Stage deployment payload
        run: |
          set -euo pipefail
          rm -rf deploy_payload
          mkdir -p deploy_payload

          rsync -a src/ deploy_payload/ \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*'

      - name: Prepare deployment script
        working-directory: deploy
        run: |
          set -euo pipefail
          npm install          

      - name: Deploy via FTP
        working-directory: deploy
        run: |
          node ./deploy.js \
            -p ${{ secrets.SFTP_PASSWORD }} \
            -h replikant3692.thinline.cz \
            -u prazelenina_burger_software \
            -s ../deploy_payload/ \
            -d .

      - name: Update deployed server
        env:
          SFTP_HOST: replikant3692.thinline.cz
          SFTP_PORT: 2736
          SFTP_USERNAME: burger_software
          SFTP_REMOTE_PATH: prazelenina.burger.software
        run: |
          set -euo pipefail
          ssh -p "$SFTP_PORT" "$SFTP_USERNAME@$SFTP_HOST" << EOF
          set -euo pipefail
          cd "$SFTP_REMOTE_PATH"
          php artisan -- migrate --force
          php artisan -- optimize
          EOF

      - name: Print deployment summary
        run: |
          echo "Deployed release: ${RELEASE_NAME}"
          echo "Remote path: ${{ secrets.SFTP_REMOTE_PATH }}"
